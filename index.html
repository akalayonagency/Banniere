<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Akatsuki Créateur de Bannière</title>

  <style>
    :root {
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --btn: rgba(255,110,0,.16);
      --btn2: rgba(255,110,0,.28);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }

    .panel {
      background: rgba(20,20,24,.45);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 16px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 30px 90px rgba(0,0,0,.45);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
    }

    .title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: .5px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .badge {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.2);
      white-space: nowrap;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    select,
    input[type="file"],
    input[type="range"] {
      width: 100%;
    }

    select,
    input[type="file"] {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline: none;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .row > * { flex: 1; }

    .btn {
      cursor: pointer;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,180,120,.18);
      background: linear-gradient(180deg, var(--btn2), var(--btn));
      color: var(--text);
      font-weight: 800;
      letter-spacing: .2px;
      text-transform: uppercase;
      transition: transform .06s ease, filter .15s ease;
      user-select: none;
    }

    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
      font-weight: 700;
      text-transform: none;
    }

    .canvasWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(15,15,18,.35);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 40px 120px rgba(0,0,0,.55);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 14px;
    }

    .errorBox {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,80,80,.25);
      background: rgba(120,0,0,.16);
      color: rgba(255,220,220,.95);
      font-size: 12px;
      display: none;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .hint {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    code {
      background: rgba(255,255,255,.06);
      padding: 1px 5px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="title">
        <h1>Créateur de Bannière</h1>
        <div class="badge">Akatsuki Orga.</div>
      </div>

      <label for="frameSelect">Choisir un cadre</label>
      <select id="frameSelect"></select>

      <label for="photoInput">Importer ta photo</label>
      <input id="photoInput" type="file" accept="image/*" />

      <label for="zoomRange">Zoom</label>
      <input id="zoomRange" type="range" min="0.8" max="3" step="0.01" value="1" />

      <div class="row">
        <button id="resetBtn" class="btn secondary" type="button">Recentrer</button>
        <button id="downloadBtn" class="btn" type="button">Télécharger PNG</button>
      </div>

      <div class="hint">
        Les valeurs <code>cx</code>, <code>cy</code>, <code>r</code> sont définies sur une base <code>1024</code> puis redimensionnées automatiquement selon la vraie taille du PNG.
      </div>

      <div id="errorBox" class="errorBox"></div>
    </div>

    <div class="panel canvasWrap" style="padding:10px;">
      <canvas id="preview" width="1024" height="1024"></canvas>
    </div>
  </div>

  <script>
    "use strict";

    /*
      Tous les masques ci-dessous sont définis en base 1024x1024.
      Le code les adapte ensuite automatiquement à la vraie taille du PNG.

      fitScale :
      - 1.00 = normal
      - 1.08 / 1.12 / 1.15 = force un remplissage plus fort du rond
    */
    const FRAMES = [
      {
        id: "b1",
        name: "Team Dragon",
        src: "TeamDragon.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.00
      },
      {
        id: "b2",
        name: "L'ombre de l'élite",
        src: "L'ombre de l'élite.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.12
      },
      {
        id: "b3",
        name: "Team Diabloss",
        src: "Team Diabloss.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.00
      },
      {
        id: "b4",
        name: "Team Fouuu",
        src: "Team Fouuu.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.00
      },
      {
        id: "b5",
        name: "Team Licorne",
        src: "TeamLicorne.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.00
      },
      {
        id: "b6",
        name: "Team Phoenix",
        src: "Team Phoenix.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.00
      },
      {
        id: "b7",
        name: "Team Panther",
        src: "team panther.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.14
      },
      {
        id: "b8",
        name: "Team Apéro",
        src: "team apéro.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.14
      },
      {
        id: "b9",
        name: "Team Gorille",
        src: "team gorille.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.14
      },
      {
        id: "b10",
        name: "Team Loup",
        src: "team loup.png",
        baseSize: 1024,
        mask: { cx: 512, cy: 512, r: 388 },
        fitScale: 1.14
      }
    ];

    const frameSelect = document.getElementById("frameSelect");
    const photoInput = document.getElementById("photoInput");
    const zoomRange = document.getElementById("zoomRange");
    const resetBtn = document.getElementById("resetBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const errorBox = document.getElementById("errorBox");

    const canvas = document.getElementById("preview");
    const ctx = canvas.getContext("2d", { alpha: true });

    const state = {
      frame: null,
      frameImg: null,
      userImg: null,
      zoom: 1,
      baseCoverScale: 1,
      offsetX: 0,
      offsetY: 0,
      dragging: false,
      dragStart: { x: 0, y: 0, ox: 0, oy: 0 }
    };

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function clearError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Impossible de charger : " + src));
        img.src = encodeURI(src);
      });
    }

    function loadUserFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onerror = () => reject(new Error("Lecture du fichier impossible."));
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("Image utilisateur invalide."));
          img.src = String(reader.result);
        };

        reader.readAsDataURL(file);
      });
    }

    function computeCoverScale(imgW, imgH, targetW, targetH) {
      return Math.max(targetW / imgW, targetH / imgH);
    }

    function getScaledMask(frame, frameImg) {
      const base = frame.baseSize || 1024;
      const scaleX = frameImg.naturalWidth / base;
      const scaleY = frameImg.naturalHeight / base;

      return {
        cx: frame.mask.cx * scaleX,
        cy: frame.mask.cy * scaleY,
        r: frame.mask.r * Math.min(scaleX, scaleY)
      };
    }

    function resetPlacement() {
      if (!state.frame || !state.userImg || !state.frameImg) return;

      const mask = getScaledMask(state.frame, state.frameImg);
      const diameter = mask.r * 2;
      const fitScale = state.frame.fitScale || 1;

      state.baseCoverScale =
        computeCoverScale(
          state.userImg.naturalWidth,
          state.userImg.naturalHeight,
          diameter,
          diameter
        ) * fitScale;

      state.zoom = 1;
      state.offsetX = 0;
      state.offsetY = 0;
      zoomRange.value = "1";

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!state.frame || !state.frameImg) return;

      const mask = getScaledMask(state.frame, state.frameImg);

      if (state.userImg) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(mask.cx, mask.cy, mask.r, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();

        const scale = state.baseCoverScale * state.zoom;
        const drawW = state.userImg.naturalWidth * scale;
        const drawH = state.userImg.naturalHeight * scale;

        const x = mask.cx - drawW / 2 + state.offsetX;
        const y = mask.cy - drawH / 2 + state.offsetY;

        ctx.drawImage(state.userImg, x, y, drawW, drawH);
        ctx.restore();
      }

      ctx.drawImage(state.frameImg, 0, 0, canvas.width, canvas.height);
    }

    function exportPNG() {
      clearError();

      if (!state.userImg) {
        showError("Importe une photo avant de télécharger.");
        return;
      }

      canvas.toBlob((blob) => {
        if (!blob) {
          showError("Export impossible.");
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (state.frame?.name || "banniere") + ".png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }, "image/png");
    }

    function populateFrames() {
      frameSelect.innerHTML = "";

      for (const frame of FRAMES) {
        const option = document.createElement("option");
        option.value = frame.id;
        option.textContent = frame.name;
        frameSelect.appendChild(option);
      }
    }

    async function setFrameById(frameId) {
      clearError();

      const frame = FRAMES.find(f => f.id === frameId) || FRAMES[0];
      state.frame = frame;
      state.frameImg = null;

      try {
        const img = await loadImage(frame.src);
        state.frameImg = img;

        canvas.width = img.naturalWidth || 1024;
        canvas.height = img.naturalHeight || 1024;

        if (state.userImg) {
          resetPlacement();
        } else {
          draw();
        }
      } catch (error) {
        console.error(error);
        showError(
          "Erreur de chargement du cadre : " + frame.src + "\n" +
          "Vérifie le nom exact du fichier et son emplacement."
        );
      }
    }

    function getCanvasPoint(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function startDrag(x, y) {
      if (!state.userImg) return;
      state.dragging = true;
      state.dragStart.x = x;
      state.dragStart.y = y;
      state.dragStart.ox = state.offsetX;
      state.dragStart.oy = state.offsetY;
    }

    function moveDrag(x, y) {
      if (!state.dragging) return;
      state.offsetX = state.dragStart.ox + (x - state.dragStart.x);
      state.offsetY = state.dragStart.oy + (y - state.dragStart.y);
      draw();
    }

    function stopDrag() {
      state.dragging = false;
    }

    frameSelect.addEventListener("change", () => {
      setFrameById(frameSelect.value);
    });

    photoInput.addEventListener("change", async (event) => {
      clearError();
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        state.userImg = await loadUserFile(file);
        resetPlacement();
      } catch (error) {
        console.error(error);
        showError("Impossible de charger cette image.");
      } finally {
        photoInput.value = "";
      }
    });

    zoomRange.addEventListener("input", () => {
      state.zoom = parseFloat(zoomRange.value) || 1;
      draw();
    });

    resetBtn.addEventListener("click", () => {
      resetPlacement();
    });

    downloadBtn.addEventListener("click", () => {
      exportPNG();
    });

    canvas.addEventListener("mousedown", (event) => {
      const p = getCanvasPoint(event.clientX, event.clientY);
      startDrag(p.x, p.y);
    });

    window.addEventListener("mousemove", (event) => {
      const p = getCanvasPoint(event.clientX, event.clientY);
      moveDrag(p.x, p.y);
    });

    window.addEventListener("mouseup", stopDrag);

    canvas.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      event.preventDefault();
      const t = event.touches[0];
      const p = getCanvasPoint(t.clientX, t.clientY);
      startDrag(p.x, p.y);
    }, { passive: false });

    window.addEventListener("touchmove", (event) => {
      if (!state.dragging || event.touches.length !== 1) return;
      event.preventDefault();
      const t = event.touches[0];
      const p = getCanvasPoint(t.clientX, t.clientY);
      moveDrag(p.x, p.y);
    }, { passive: false });

    window.addEventListener("touchend", stopDrag);

    function boot() {
      populateFrames();
      if (FRAMES.length > 0) {
        setFrameById(FRAMES[0].id);
      }
    }

    boot();
  </script>
</body>
</html>
